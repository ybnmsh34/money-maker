<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>CSV to JSON Converter - Convert CSV to JSON Format | FileTools</title>
<meta name="description" content="Convert CSV files to JSON format online. Free, fast, private. No upload required."><link rel="stylesheet" href="../css/style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"></head><body>
    <div class="scanline"></div>
<nav class="navbar"><div class="container nav-content"><a href="../index.html" class="logo"><svg width="32" height="32" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="url(#toolLogoGrad)"/><defs><linearGradient id="toolLogoGrad" x1="0" y1="0" x2="32" y2="32"><stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs><path d="M8 16L14 22L24 10" stroke="white" stroke-width="3"/></svg><span>FileTools</span></a></div></nav>
<main class="container tool-page"><div class="tool-header"><a href="../index.html" class="back-link">← Back</a><h1>CSV to JSON</h1><p>Convert CSV files to JSON format.</p></div>
<div class="upload-zone"><h3>Drop CSV file or click</h3><input type="file" id="fileInput" accept=".csv" hidden></div>
<div class="result-area" id="resultArea" style="display:none;"><h3>Converted!</h3><pre id="jsonOutput" style="text-align:left;background:var(--bg-secondary);padding:16px;border-radius:8px;overflow:auto;max-height:400px;margin:16px 0;"></pre><div class="result-buttons"><button class="btn btn-primary" onclick="downloadJSON()">⬇ Download JSON</button></div></div>
<script src="../js/tool-common.js"></script><script>
const fileInput = document.getElementById('fileInput');
fileInput.addEventListener('click', () => document.getElementById('fileInput').click());
fileInput.addEventListener('change', (e) => { if (e.target.files[0]) { const reader = new FileReader(); reader.onload = (ev) => { try { const lines = ev.target.result.split('\n').filter(l => l.trim()); const headers = lines[0].split(',').map(h => h.trim()); const result = lines.slice(1).map(line => { const values = line.split(','); const obj = {}; headers.forEach((h, i) => obj[h] = values[i]?.trim()); return obj; }); document.getElementById('jsonOutput').textContent = JSON.stringify(result, null, 2); document.getElementById('resultArea').style.display = 'block'; window.jsonData = JSON.stringify(result, null, 2); } catch(err) { alert('Invalid CSV'); } }; reader.readAsText(e.target.files[0]); }});
function downloadJSON() { if (window.jsonData) downloadFile(window.jsonData, 'data.json', 'application/json'); }
</script></main></body></html>
