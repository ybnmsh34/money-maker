<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Diff Checker — Free Online Tool</title>
    <meta name="description" content="Compare two texts and see the differences. Free online diff checker. Fast, private, works in your browser.">
    <meta name="keywords" content="diff checker, text diff, compare text, diff tool, text comparison">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>≠</text></svg>">
    <style>
        .diff-added { background: rgba(76,175,80,0.2); color: #81c784; }
        .diff-removed { background: rgba(244,67,54,0.2); color: #e57373; }
        .diff-line { padding: 2px 8px; font-family: monospace; font-size: 13px; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="container"><a href="/" class="logo">⚡ DevUtils</a><div class="nav-links"><a href="/#tools">All Tools</a></div></div></nav>
    <header class="tool-page-header"><div class="container">
        <a href="/" class="back-link">← Back to all tools</a>
        <h1>Text Diff Checker</h1>
        <p>Compare two texts and see the differences line by line.</p>
    </div></header>
    <main class="container">
        <div class="tool-workspace">
            <div class="tool-panel">
                <div class="tool-panel-header"><span class="tool-panel-title">Original Text</span></div>
                <textarea id="diff-left" class="tool-input" placeholder="Paste original text here..." spellcheck="false"></textarea>
            </div>
            <div class="tool-panel">
                <div class="tool-panel-header"><span class="tool-panel-title">Modified Text</span></div>
                <textarea id="diff-right" class="tool-input" placeholder="Paste modified text here..." spellcheck="false"></textarea>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="computeDiff()">Compare</button>
            <button class="btn btn-secondary" onclick="swapTexts()">⇄ Swap</button>
            <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
        </div>
        <div class="tool-panel" style="margin-top: 16px;">
            <div class="tool-panel-header"><span class="tool-panel-title">Diff Result</span>
                <span id="diff-stats" style="color: var(--text-muted); font-size: 0.85rem;"></span>
            </div>
            <div id="diff-output" class="tool-output" style="white-space: pre; font-family: monospace;"></div>
        </div>
    </main>
    <footer class="footer"><div class="container"><p>&copy; 2026 DevUtils. Free developer tools for everyone.</p></div></footer>
    <script>
        const left = document.getElementById('diff-left');
        const right = document.getElementById('diff-right');
        const output = document.getElementById('diff-output');
        const stats = document.getElementById('diff-stats');

        function lcs(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({length: m+1}, () => Array(n+1).fill(0));
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);
            const result = [];
            let i = m, j = n;
            while (i > 0 && j > 0) {
                if (a[i-1] === b[j-1]) { result.unshift(i-1); i--; j--; }
                else if (dp[i-1][j] > dp[i][j-1]) i--;
                else j--;
            }
            return result;
        }

        function computeDiff() {
            const linesA = left.value.split('\n');
            const linesB = right.value.split('\n');
            const common = lcs(linesA, linesB);
            let html = '';
            let i = 0, j = 0, k = 0;
            let added = 0, removed = 0;

            while (i < linesA.length || j < linesB.length) {
                if (k < common.length && i < linesA.length && j < linesB.length && i === common[k] && j === common[k]) {
                    html += '<div class="diff-line">  ' + escapeHtml(linesA[i]) + '</div>';
                    i++; j++; k++;
                } else if (k < common.length && i < common[k]) {
                    html += '<div class="diff-line diff-removed">- ' + escapeHtml(linesA[i]) + '</div>';
                    i++; removed++;
                } else if (k < common.length && j < common[k]) {
                    html += '<div class="diff-line diff-added">+ ' + escapeHtml(linesB[j]) + '</div>';
                    j++; added++;
                } else if (i < linesA.length) {
                    html += '<div class="diff-line diff-removed">- ' + escapeHtml(linesA[i]) + '</div>';
                    i++; removed++;
                } else if (j < linesB.length) {
                    html += '<div class="diff-line diff-added">+ ' + escapeHtml(linesB[j]) + '</div>';
                    j++; added++;
                }
            }

            output.innerHTML = html;
            stats.textContent = added + ' added, ' + removed + ' removed';
        }

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        function swapTexts() {
            const tmp = left.value;
            left.value = right.value;
            right.value = tmp;
            computeDiff();
        }

        function clearAll() {
            left.value = ''; right.value = ''; output.innerHTML = ''; stats.textContent = '';
        }
    </script>
</body>
</html>
