<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator — Free Online Tool</title>
    <meta name="description" content="Generate Lorem Ipsum placeholder text. Free online tool. Choose paragraphs, sentences, or words.">
    <meta name="keywords" content="lorem ipsum generator, placeholder text, dummy text, filler text">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>¶</text></svg>">
</head>
<body>
    <nav class="navbar"><div class="container"><a href="/" class="logo">⚡ DevUtils</a><div class="nav-links"><a href="/#tools">All Tools</a></div></div></nav>
    <header class="tool-page-header"><div class="container">
        <a href="/" class="back-link">← Back to all tools</a>
        <h1>Lorem Ipsum Generator</h1>
        <p>Generate placeholder text for your designs and mockups.</p>
    </div></header>
    <main class="container">
        <div class="controls-row" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);">
            <label for="lipsum-type">Generate:</label>
            <select id="lipsum-type">
                <option value="paragraphs" selected>Paragraphs</option>
                <option value="sentences">Sentences</option>
                <option value="words">Words</option>
            </select>
            <label for="lipsum-count">Count:</label>
            <input type="number" id="lipsum-count" value="3" min="1" max="100" style="width: 80px; padding: 8px 12px; background: var(--bg-input); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.9rem;">
            <label><input type="checkbox" id="lipsum-start"> Start with "Lorem ipsum..."</label>
        </div>
        <div class="tool-panel" style="margin-top: 16px;">
            <div class="tool-panel-header"><span class="tool-panel-title">Generated Text</span>
                <div><button class="btn btn-secondary btn-small" onclick="copyText()">Copy</button> <button class="btn btn-secondary btn-small" onclick="downloadText()">Download .txt</button></div>
            </div>
            <div id="lipsum-output" class="tool-output" style="white-space: pre-wrap; font-family: sans-serif;"></div>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="generate()">Generate</button>
        </div>
    </main>
    <footer class="footer"><div class="container"><p>&copy; 2026 DevUtils. Free developer tools for everyone.</p></div></footer>
    <script>
        const loremWords = ['lorem','ipsum','dolor','sit','amet','consectetur','adipiscing','elit','sed','do','eiusmod','tempor','incididunt','ut','labore','et','dolore','magna','aliqua','enim','ad','minim','veniam','quis','nostrud','exercitation','ullamco','laboris','nisi','aliquip','ex','ea','commodo','consequat','duis','aute','irure','in','reprehenderit','voluptate','velit','esse','cillum','fugiat','nulla','pariatur','excepteur','sint','occaecat','cupidatat','non','proident','sunt','culpa','qui','officia','deserunt','mollit','anim','id','est','laborum'];
        const output = document.getElementById('lipsum-output');

        function randomWords(n) {
            const words = [];
            for (let i = 0; i < n; i++) words.push(loremWords[Math.floor(Math.random() * loremWords.length)]);
            return words;
        }

        function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

        function makeSentence(startWithLorem) {
            const len = 8 + Math.floor(Math.random() * 12);
            let words;
            if (startWithLorem) {
                words = ['Lorem ipsum dolor sit amet,'];
                const rest = randomWords(len - 2).join(' ');
                words.push(capitalize(rest) + '.');
            } else {
                words = [capitalize(randomWords(len).join(' ')) + '.'];
            }
            return words.join(' ');
        }

        function makeParagraph(startWithLorem) {
            const sentences = 3 + Math.floor(Math.random() * 4);
            const s = [];
            for (let i = 0; i < sentences; i++) {
                s.push(makeSentence(i === 0 && startWithLorem));
            }
            return s.join(' ');
        }

        function generate() {
            const type = document.getElementById('lipsum-type').value;
            const count = Math.min(100, Math.max(1, parseInt(document.getElementById('lipsum-count').value) || 3));
            const startWithLorem = document.getElementById('lipsum-start').checked;
            let result = '';

            if (type === 'paragraphs') {
                const paras = [];
                for (let i = 0; i < count; i++) paras.push(makeParagraph(i === 0 && startWithLorem));
                result = paras.join('\n\n');
            } else if (type === 'sentences') {
                const sents = [];
                for (let i = 0; i < count; i++) sents.push(makeSentence(i === 0 && startWithLorem));
                result = sents.join(' ');
            } else {
                const words = startWithLorem ? ['Lorem', 'ipsum', ...randomWords(count - 2)] : randomWords(count);
                result = words.join(' ');
            }

            output.textContent = result;
        }

        function copyText() {
            const text = output.textContent;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }

        function downloadText() {
            const text = output.textContent;
            if (!text) return;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'lorem-ipsum.txt'; a.click();
            URL.revokeObjectURL(url);
        }

        generate();
    </script>
</body>
</html>
