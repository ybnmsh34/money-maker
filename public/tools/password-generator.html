<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator — Free Online Tool</title>
    <meta name="description" content="Generate strong, secure passwords instantly. Free online password generator. Customize length and character types.">
    <meta name="keywords" content="password generator, random password, secure password, strong password generator">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>">
</head>
<body>
    <nav class="navbar"><div class="container"><a href="/" class="logo">⚡ DevUtils</a><div class="nav-links"><a href="/#tools">All Tools</a></div></div></nav>
    <header class="tool-page-header"><div class="container">
        <a href="/" class="back-link">← Back to all tools</a>
        <h1>Password Generator</h1>
        <p>Generate strong, secure passwords instantly.</p>
    </div></header>
    <main class="container">
        <div class="tool-panel">
            <div class="tool-panel-header"><span class="tool-panel-title">Generated Password</span>
                <button class="btn btn-secondary btn-small" onclick="copyPassword()">Copy</button>
            </div>
            <div id="password-display" style="padding: 24px; font-family: monospace; font-size: 1.5rem; text-align: center; letter-spacing: 2px; word-break: break-all; min-height: 80px; display: flex; align-items: center; justify-content: center;"></div>
            <div id="strength-bar" style="height: 6px; background: var(--bg-input);">
                <div id="strength-fill" style="height: 100%; width: 0%; transition: width 0.3s, background 0.3s;"></div>
            </div>
            <div id="strength-text" style="text-align: center; padding: 8px; color: var(--text-muted); font-size: 0.9rem;"></div>
        </div>
        <div class="controls-row" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-top: 16px;">
            <label for="pwd-length">Length:</label>
            <input type="range" id="pwd-length" min="4" max="128" value="20" style="flex: 1;">
            <span id="pwd-length-val" style="color: var(--text-muted); min-width: 30px;">20</span>
            <label><input type="checkbox" id="pwd-upper" checked> A-Z</label>
            <label><input type="checkbox" id="pwd-lower" checked> a-z</label>
            <label><input type="checkbox" id="pwd-digits" checked> 0-9</label>
            <label><input type="checkbox" id="pwd-symbols" checked> !@#$%</label>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="generate()">Generate Password</button>
            <button class="btn btn-secondary" onclick="generateMultiple()">Generate 5 Passwords</button>
        </div>
        <div id="pwd-status" style="margin-top: 16px;"></div>
        <div id="pwd-multiple" style="margin-top: 16px;"></div>
    </main>
    <footer class="footer"><div class="container"><p>&copy; 2026 DevUtils. Free developer tools for everyone.</p></div></footer>
    <script>
        const display = document.getElementById('password-display');
        const strengthFill = document.getElementById('strength-fill');
        const strengthText = document.getElementById('strength-text');
        const status = document.getElementById('pwd-status');
        const multipleDiv = document.getElementById('pwd-multiple');
        const lengthSlider = document.getElementById('pwd-length');
        const lengthVal = document.getElementById('pwd-length-val');
        let currentPassword = '';

        lengthSlider.addEventListener('input', () => {
            lengthVal.textContent = lengthSlider.value;
            generate();
        });

        document.querySelectorAll('#pwd-upper, #pwd-lower, #pwd-digits, #pwd-symbols').forEach(cb => {
            cb.addEventListener('change', () => {
                const any = document.getElementById('pwd-upper').checked || document.getElementById('pwd-lower').checked || document.getElementById('pwd-digits').checked || document.getElementById('pwd-symbols').checked;
                if (!any) { cb.checked = true; status.innerHTML = '<div class="status-message status-error">At least one character type must be selected</div>'; return; }
                generate();
            });
        });

        function getChars() {
            let chars = '';
            if (document.getElementById('pwd-upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (document.getElementById('pwd-lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (document.getElementById('pwd-digits').checked) chars += '0123456789';
            if (document.getElementById('pwd-symbols').checked) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
            return chars;
        }

        function generateOne() {
            const chars = getChars();
            const length = parseInt(lengthSlider.value);
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);
            let pwd = '';
            for (let i = 0; i < length; i++) pwd += chars[array[i] % chars.length];
            return pwd;
        }

        function calculateStrength(pwd) {
            let score = 0;
            const len = pwd.length;
            if (len >= 8) score += 1;
            if (len >= 12) score += 1;
            if (len >= 16) score += 1;
            if (len >= 24) score += 1;
            if (/[a-z]/.test(pwd)) score += 1;
            if (/[A-Z]/.test(pwd)) score += 1;
            if (/\d/.test(pwd)) score += 1;
            if (/[^a-zA-Z0-9]/.test(pwd)) score += 1;
            return Math.min(score / 8, 1);
        }

        function updateStrength(pwd) {
            const strength = calculateStrength(pwd);
            const pct = Math.round(strength * 100);
            strengthFill.style.width = pct + '%';
            if (pct < 30) { strengthFill.style.background = '#f44336'; strengthText.textContent = 'Weak'; }
            else if (pct < 60) { strengthFill.style.background = '#ff9800'; strengthText.textContent = 'Fair'; }
            else if (pct < 80) { strengthFill.style.background = '#ffeb3b'; strengthText.textContent = 'Good'; }
            else { strengthFill.style.background = '#4caf50'; strengthText.textContent = 'Strong'; }
        }

        function generate() {
            currentPassword = generateOne();
            display.textContent = currentPassword;
            updateStrength(currentPassword);
            multipleDiv.innerHTML = '';
            status.innerHTML = '';
        }

        function generateMultiple() {
            const passwords = [];
            for (let i = 0; i < 5; i++) passwords.push(generateOne());
            let html = '<div class="tool-panel"><div class="tool-panel-header"><span class="tool-panel-title">5 Passwords</span><button class="btn btn-secondary btn-small" onclick="copyMultiple()">Copy All</button></div><div class="uuid-list">';
            passwords.forEach(p => { html += '<div class="uuid-item" onclick="navigator.clipboard.writeText(\'' + p + '\');">' + escapeHtml(p) + '</div>'; });
            html += '</div></div>';
            multipleDiv.innerHTML = html;
            currentPassword = passwords[0];
            display.textContent = currentPassword;
            updateStrength(currentPassword);
        }

        function copyPassword() {
            if (!currentPassword) return;
            navigator.clipboard.writeText(currentPassword).then(() => {
                status.innerHTML = '<div class="status-message status-success">✓ Password copied!</div>';
            });
        }

        function copyMultiple() {
            const items = multipleDiv.querySelectorAll('.uuid-item');
            const text = Array.from(items).map(el => el.textContent).join('\n');
            navigator.clipboard.writeText(text).then(() => {
                status.innerHTML = '<div class="status-message status-success">✓ All passwords copied!</div>';
            });
        }

        function escapeHtml(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

        generate();
    </script>
</body>
</html>
