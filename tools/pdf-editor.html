    <script>


        console.log('PDF Editor script loaded');
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
        let pdfDoc = null, currentFile = null, zoom = 1, changes = 0, currentEditingEl = null, lastEditingEl = null, allPages = [];
        let documentDir = 'ltr'; // dominant direction computed at parse time

        // ---- Boundary constants (PDF points, unscaled) ----
        const EDGE_PAD = 72;      // 1-inch margins (Word / Google Docs standard)
        const MIN_SPAN_WIDTH = 40;
        const BOTTOM_PAD = 72;    // 1-inch bottom margin to match

        // ---- Phase 1: boundary source of truth ----
        // Returns {width, height} in unscaled PDF points for a given 1-based page number.
        function getPageBounds(pageNum) {
            const entry = allPages[pageNum - 1];
            if (!entry) {
                console.warn('getPageBounds: page ' + pageNum + ' not found in allPages');
                return { width: 612, height: 792 }; // fallback A4
            }
            return { width: entry.width, height: entry.height };
        }

        // ---- Phase 2: direction detection ----
        // Detect if text contains RTL characters (Hebrew U+0590–U+05FF, Arabic U+0600–U+06FF)
        function detectDirection(text) {
            if (!text) return 'ltr';
            for (let i = 0; i < text.length; i++) {
                const c = text.charCodeAt(i);
                if ((c >= 0x0590 && c <= 0x05FF) || (c >= 0x0600 && c <= 0x06FF)) return 'rtl';
            }
            return 'ltr';
        }

        // Compute document-dominant direction from all extracted text
        function computeDocumentDirection() {
            let rtlChars = 0, ltrChars = 0;
            for (const page of allPages) {
                for (const line of page.lines) {
                    for (const item of line.items) {
                        for (let i = 0; i < item.str.length; i++) {
                            const c = item.str.charCodeAt(i);
                            if ((c >= 0x0590 && c <= 0x05FF) || (c >= 0x0600 && c <= 0x06FF)) rtlChars++;
                            else if (c >= 0x0020 && c < 0x0590) ltrChars++; // printable ASCII-Latin
                        }
                    }
                }
            }
            documentDir = rtlChars > ltrChars ? 'rtl' : 'ltr';
            console.log('[Phase 2] Document direction: ' + documentDir + ' (rtl=' + rtlChars + ', ltr=' + ltrChars + ')');
            return documentDir;
        }

        // Position a span with direction awareness. Sets CSS left OR right (not both).
        function positionSpan(span, meta, zoomLevel) {
            const z = zoomLevel || zoom;
            if (meta.dir === 'rtl') {
                // RTL: anchor right edge, position with CSS right
                const anchorRight = meta.x + meta.width; // from extraction
                const rightPx = (getPageBounds(meta.pageNum).width - anchorRight) * z;
                span.style.left = '';
                span.style.right = rightPx + 'px';
            } else {
                // LTR: position with CSS left
                span.style.right = '';
                span.style.left = (meta.x * z) + 'px';
            }
            span.style.top = ((meta.y - meta.fontSize) * z) + 'px';
        }

        // ---- Phase 3: directional overflow wrapping ----
        // Called on every input event. Splits overflowing text at last word break.
        function handleOverflowWrap(span) {
            const meta = span._meta;
            const pageDiv = span.parentElement;
            if (!pageDiv || !meta) return;

            const bounds = getPageBounds(meta.pageNum);
            const pageWidth = bounds.width;
            const text = span.textContent || '';

            // Measure rendered width in unscaled PDF points
            const renderedWidth = span.offsetWidth / zoom;

            // Check overflow based on direction
            let overflowing = false;
            if (meta.dir === 'rtl') {
                // RTL: anchorRight - textWidth < EDGE_PAD means text extends past left edge
                const anchorRight = meta.x + meta.width;
                if (anchorRight - renderedWidth < EDGE_PAD) overflowing = true;
            } else {
                // LTR: x + textWidth > pageWidth - EDGE_PAD
                if (meta.x + renderedWidth > pageWidth - EDGE_PAD) overflowing = true;
            }

            if (!overflowing) return;

            // Find last word break (space) that fits within the line
            const maxTextWidth = (meta.dir === 'rtl')
                ? (meta.x + meta.width) - EDGE_PAD  // for RTL: how much room from left edge to anchorRight
                : pageWidth - EDGE_PAD - meta.x;    // for LTR: how much room from x to right edge

            // Find split point: last word break where left portion fits
            let splitIdx = -1;
            for (let i = text.length - 1; i >= 0; i--) {
                if (text[i] === ' ') {
                    const candidate = text.substring(0, i);
                    // Create temp to measure
                    const tempSpan = document.createElement('span');
                    tempSpan.style.fontSize = span.style.fontSize;
                    tempSpan.style.fontFamily = span.style.fontFamily;
                    tempSpan.style.fontWeight = span.style.fontWeight;
                    tempSpan.style.fontStyle = span.style.fontStyle;
                    tempSpan.style.whiteSpace = 'pre';
                    tempSpan.style.position = 'absolute';
                    tempSpan.style.visibility = 'hidden';
                    tempSpan.style.left = '-9999px';
                    tempSpan.textContent = candidate;
                    pageDiv.appendChild(tempSpan);
                    const candidateWidth = tempSpan.offsetWidth / zoom;
                    pageDiv.removeChild(tempSpan);
                    if (candidateWidth <= maxTextWidth) {
                        splitIdx = i;
                        break;
                    }
                }
            }

            // If no word break fits and text is > 1 char, split at max possible
            // (Phase 3 rule: unbreakable word lets overflow, but we still try to wrap at character level
            //  to prevent infinite loops. Single unbreakable word wider than line is left alone.)
            if (splitIdx === -1 && text.length > 1) {
                // Try character-by-character binary search for max fitting length
                let lo = 1, hi = text.length - 1, bestFit = 0;
                while (lo <= hi) {
                    const mid = (lo + hi) >> 1;
                    const candidate = text.substring(0, mid);
                    const tempSpan = document.createElement('span');
                    tempSpan.style.fontSize = span.style.fontSize;
                    tempSpan.style.fontFamily = span.style.fontFamily;
                    tempSpan.style.fontWeight = span.style.fontWeight;
                    tempSpan.style.fontStyle = span.style.fontStyle;
                    tempSpan.style.whiteSpace = 'pre';
                    tempSpan.style.position = 'absolute';
                    tempSpan.style.visibility = 'hidden';
                    tempSpan.style.left = '-9999px';
                    tempSpan.textContent = candidate;
                    pageDiv.appendChild(tempSpan);
                    const candidateWidth = tempSpan.offsetWidth / zoom;
                    pageDiv.removeChild(tempSpan);
                    if (candidateWidth <= maxTextWidth) {
                        bestFit = mid;
                        lo = mid + 1;
                    } else {
                        hi = mid - 1;
                    }
                }
                if (bestFit > 0) splitIdx = bestFit;
            }

            if (splitIdx <= 0) return; // Can't split (single unbreakable word or empty)

            // Save caret info: character offset of caret before DOM surgery
            const caretOffset = getCursorOffset(span);

            // Split at word break
            const before = text.substring(0, splitIdx).replace(/ +$/, ''); // trim trailing space
            const after = text.substring(splitIdx).replace(/^ +/, '');      // trim leading space

            // Update current span
            span.textContent = before;
            span.dataset.originalText = before;
            if (!span.classList.contains('changed')) {
                span.classList.add('changed');
                changes++;
                updateChangeCount();
            }

            // Create continuation span one line-height below (Phase 4: use PDF-derived leading)
            const newY = meta.y + (meta.leading || meta.height);
            let contX;
            if (meta.dir === 'rtl') {
                // RTL continuation: same anchorRight as parent
                const estimatedWidth = after.length * meta.fontSize * 0.6;
                contX = (meta.x + meta.width) - estimatedWidth;
            } else {
                // LTR continuation: same left origin
                contX = meta.x;
            }

            const contSpan = createNewSpan(meta.pageNum, contX, newY, meta.fontSize, after, meta.fontName, meta.dir, meta.leading, {isBold:meta.isBold,isItalic:meta.isItalic,hasUnderline:meta.hasUnderline,color:span.style.color,fontType:meta.fontType||null});
            // Phase 4: clamp continuation span
            clampSpanPosition(contSpan._meta, meta.pageNum);
            positionSpan(contSpan, contSpan._meta);
            contSpan.classList.add('changed');
            changes++;
            updateChangeCount();
            pageDiv.appendChild(contSpan);

            // Shift spans below (Phase 4: use PDF-derived leading)
            shiftSpansDown(pageDiv, meta.y, meta.leading || meta.height, meta.pageNum, span);

            // Handle bottom overflow (cascade to new pages)
            const allOverflow = Array.from(pageDiv.querySelectorAll('.text-span')).filter(s => {
                const top = parseFloat(s.style.top);
                const h = s._meta ? s._meta.height * zoom : parseFloat(s.offsetHeight || s.style.fontSize);
                return top + h > pageDiv.offsetHeight - BOTTOM_PAD;
            });
            if (allOverflow.length > 0) {
                cascadeSpansToNewPages(allOverflow, pageDiv, meta.pageNum);
            }

            // Restore caret
            // If caret was before split point, keep it in original span
            // If caret was at/after split point, move to continuation span
            requestAnimationFrame(() => {
                if (caretOffset >= before.length) {
                    contSpan.focus();
                    setCursorOffset(contSpan, 0);
                } else {
                    span.focus();
                    setCursorOffset(span, caretOffset);
                }
            });
        }

        // ---- Phase 5: edge guide ----
        function showEdgeGuide(span) {
            if (!span._meta || !span.parentElement) return;
            const meta = span._meta;
            const bounds = getPageBounds(meta.pageNum);
            const w = span.offsetWidth / zoom;
            const THRESHOLD = 30; // points

            let nearEdge = false;
            if (meta.dir === 'ltr') {
                // LTR: near right edge when x + w > pageWidth - EDGE_PAD - THRESHOLD
                if (meta.x + w > bounds.width - EDGE_PAD - THRESHOLD) nearEdge = true;
            } else {
                // RTL: near left edge when anchorRight - w < EDGE_PAD + THRESHOLD
                const rightPx = parseFloat(span.style.right);
                const anchorRight = (rightPx / zoom) + w;
                if (anchorRight - w < EDGE_PAD + THRESHOLD) nearEdge = true;
            }
            span.classList.toggle('edge-guide', nearEdge);
        }

        // ---- Phase 4: clamp span creation coordinates ----
        function clampSpanPosition(meta, pageNum) {
            const bounds = getPageBounds(pageNum);
            const pw = bounds.width;
            const ph = bounds.height;
            const lh = (meta.leading || meta.height) || 12;  // Phase 4: use leading for vertical clamping

            if (meta.dir === 'rtl') {
                // RTL: clamp anchorRight into [MIN_SPAN_WIDTH, pageWidth - EDGE_PAD]
                let ar = meta.x + meta.width;
                ar = Math.max(MIN_SPAN_WIDTH, Math.min(pw - EDGE_PAD, ar));
                meta.width = Math.max(MIN_SPAN_WIDTH, meta.width || MIN_SPAN_WIDTH);
                meta.x = ar - meta.width;
            } else {
                // LTR: clamp x into [EDGE_PAD, pageWidth - MIN_SPAN_WIDTH]
                meta.x = Math.max(EDGE_PAD, Math.min(pw - MIN_SPAN_WIDTH, meta.x));
                meta.width = Math.max(MIN_SPAN_WIDTH, meta.width || MIN_SPAN_WIDTH);
            }
            // Clamp y
            meta.y = Math.max(EDGE_PAD, Math.min(ph - lh - EDGE_PAD, meta.y));
            return meta;
        }

        // Cascade spans past bottom edge to new page(s) — reused by Enter-split and overflow-wrap
        function cascadeSpansToNewPages(overflowSpans, pageDiv, pageNum) {
            const nextPageNum = allPages.length + 1;
            const nextPageDiv = createNewPage(nextPageNum, pageDiv.offsetWidth, pageDiv.offsetHeight);
            viewer.appendChild(nextPageDiv);
            setupDoubleClickOnPage(nextPageDiv);
            allPages.push({ pageNum: nextPageNum, width: pageDiv.offsetWidth / zoom, height: pageDiv.offsetHeight / zoom, lines: [] });
            createNewThumbnail(nextPageNum);

            let currentDiv = nextPageDiv;
            let currentPageNum = nextPageNum;
            const topOffset = 20;
            const maxY = currentDiv.offsetHeight / zoom - BOTTOM_PAD;
            let curY = topOffset;

            for (const os of overflowSpans) {
                const spanHeight = os._meta ? os._meta.height : 12;
                if (curY + spanHeight > maxY) {
                    const nn = allPages.length + 1;
                    const nd = createNewPage(nn, currentDiv.offsetWidth, currentDiv.offsetHeight);
                    viewer.appendChild(nd);
                    setupDoubleClickOnPage(nd);
                    allPages.push({ pageNum: nn, width: currentDiv.offsetWidth / zoom, height: currentDiv.offsetHeight / zoom, lines: [] });
                    createNewThumbnail(nn);
                    currentDiv = nd;
                    currentPageNum = nn;
                    curY = topOffset;
                }
                os.style.top = (curY * zoom) + 'px';
                if (os._meta) { os._meta.y = curY; os._meta.pageNum = currentPageNum; }
                os.dataset.page = currentPageNum;
                currentDiv.appendChild(os);
                curY += spanHeight;
            }
        }
        const $ = id => document.getElementById(id);
        const uploadZone=$('uploadZone'), fileInput=$('fileInput'), editorArea=$('editorArea'), viewer=$('viewer'),
            progressBar=$('progressBar'), progressFill=$('progressFill'), resultArea=$('resultArea'),
            downloadLink=$('downloadLink'), zoomLevelEl=$('zoomLevel'), pagesPanel=$('pagesPanel'),
            changeCountEl=$('changeCount'), fontFamilySelect=$('fontFamily'), fontSizeInput=$('fontSizeInput'),
            fontColorInput=$('fontColor'), boldBtn=$('boldBtn'), italicBtn=$('italicBtn'), underlineBtn=$('underlineBtn');

        uploadZone.addEventListener('click', () => fileInput.click());
        uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('dragover'); const f=e.dataTransfer.files[0]; if(f&&f.type==='application/pdf') loadPDF(f); else alert('Please upload a valid PDF file'); });
        fileInput.addEventListener('change', e => { if(e.target.files[0]) loadPDF(e.target.files[0]); });
        // ---- Phase 2 fix: toolbar focus preservation ----
        // Buttons use onmousedown="event.preventDefault()" to prevent focus steal.
        // lastEditingEl tracks the last focused span and survives blur events (for toolbar use).
        // currentEditingEl tracks the currently focused span (for visual toolbar state).
        function applyToolbarChange(handler){
            const savedEl = currentEditingEl;
            handler();
            if(savedEl && !currentEditingEl) currentEditingEl = savedEl;
        }
        fontFamilySelect.addEventListener('change', () => {
            if(lastEditingEl){
                lastEditingEl.style.fontFamily = mapFontType(fontFamilySelect.value);
                lastEditingEl._meta.fontType = fontFamilySelect.value;  // Track font for export
            }
        });
        fontSizeInput.addEventListener('change', () => { if(lastEditingEl) lastEditingEl.style.fontSize = (parseInt(fontSizeInput.value)*zoom)+'px'; });
        fontColorInput.addEventListener('input', () => { if(lastEditingEl) lastEditingEl.style.color = fontColorInput.value; });
        // Dir toggle: apply direction to current span
        $('dirToggle').addEventListener('change', function(){
            if(lastEditingEl && lastEditingEl._meta){
                lastEditingEl._meta.dir = this.value;
                lastEditingEl.setAttribute('dir', this.value);
                positionSpan(lastEditingEl, lastEditingEl._meta);
            }
        });
        function toggleBold(){ if(!lastEditingEl)return; lastEditingEl.style.fontWeight=lastEditingEl.style.fontWeight==='bold'?'normal':'bold'; boldBtn.style.background=lastEditingEl.style.fontWeight==='bold'?'rgba(0,212,255,0.3)':''; }
        function toggleItalic(){ if(!lastEditingEl)return; lastEditingEl.style.fontStyle=lastEditingEl.style.fontStyle==='italic'?'normal':'italic'; italicBtn.style.background=lastEditingEl.style.fontStyle==='italic'?'rgba(0,212,255,0.3)':''; }
        function toggleUnderline(){ if(!lastEditingEl)return; lastEditingEl.style.textDecoration=lastEditingEl.style.textDecoration==='underline'?'none':'underline'; underlineBtn.style.background=lastEditingEl.style.textDecoration==='underline'?'rgba(0,212,255,0.3)':''; }

        // ============================================================
        // LOAD: parse PDF only, never render it for display
        // ============================================================
        async function loadPDF(file){
            currentFile=file; changes=0; allPages=[]; updateChangeCount();
            progressBar.style.display='block'; progressFill.style.width='10%';
            try{
                const ab=await file.arrayBuffer(), bytes=new Uint8Array(ab);
                pdfDoc=await pdfjsLib.getDocument({data:bytes.slice()}).promise;
                progressFill.style.width='30%'; viewer.innerHTML=''; pagesPanel.innerHTML='';
                for(let i=1;i<=pdfDoc.numPages;i++){
                    progressFill.style.width=(30+(i/pdfDoc.numPages*50))+'%';
                    await parsePage(i);
                }
                progressFill.style.width='100%';
                // Phase 1 verification: log bounds for each page
                console.log('[Phase 1] Page bounds (PDF points, unscaled):');
                for(let i=1;i<=allPages.length;i++){
                    const b=getPageBounds(i);
                    console.log('  Page '+i+': '+b.width.toFixed(1)+'×'+b.height.toFixed(1));
                }
                // Phase 2: compute document direction and set toolbar default
                const dir = computeDocumentDirection();
                $('dirToggle').value = dir;
                setTimeout(()=>{progressBar.style.display='none';},300);
                uploadZone.style.display='none'; editorArea.style.display='block';
            }catch(err){console.error('Load failed:',err); alert('Failed to load PDF: '+err.message); progressBar.style.display='none';}
        }

        // ============================================================
        // PARSE PAGE: extract data, build pure HTML
        // ============================================================
        async function parsePage(pageNum){
            const page=await pdfDoc.getPage(pageNum);
            const viewport=page.getViewport({scale:1});
            const ops=await page.getOperatorList();
            const textContent=await page.getTextContent();

            const textStyles=extractTextStyles(ops);
            const underlines=extractUnderlines(ops,viewport);
            const lines=groupTextIntoLines(textContent.items,viewport,textStyles,underlines);
            allPages.push({pageNum,width:viewport.width,height:viewport.height,lines});
            buildHTMLPage(pageNum,viewport,lines);
            await createThumbnail(pageNum);
        }

        // ============================================================
        // EXTRACT TEXT STYLES FROM OPERATOR LIST (colors, fonts)
        // ============================================================
        function extractTextStyles(ops){
            const styles=new Map();
            let cc={r:0,g:0,b:0}, cf=null, cfs=0, stc=0;
            for(let i=0;i<ops.fnArray.length;i++){
                const op=ops.fnArray[i], args=ops.argsArray[i];
                if(op===59&&args&&args.length>=3) cc={r:args[0],g:args[1],b:args[2]};
                if(op===37&&args&&args.length>=2){cf=args[0];cfs=args[1];}
                if((op>=44&&op<=47)&&args){
                    stc++; let ht=false;
                    if(args[0]){
                        const chars=Array.isArray(args[0])?args[0]:[args[0]];
                        const t=chars.map(c=>typeof c==='number'?'':(c.unicode||'')).join('');
                        if(t.trim()) ht=true;
                    }
                    styles.set(stc,{color:{...cc},fontName:cf,fontSize:cfs,hasText:ht});
                }
            }
            return styles;
        }

        // ============================================================
        // EXTRACT UNDERLINES FROM OPERATOR LIST (thin rectangles)
        // ============================================================
        function extractUnderlines(ops,viewport){
            const ul=[];
            for(let i=0;i<ops.fnArray.length;i++){
                if(ops.fnArray[i]!==91) continue;
                const args=ops.argsArray[i];
                for(let j=1;j<args.length;j++){
                    const s=args[j];
                    if(s&&s.length>=4&&s[3]<5&&s[2]>20&&s[2]<600)
                        ul.push({y:viewport.height-s[1],x:s[0],width:s[2]});
                }
            }
            return ul;
        }

        // ============================================================
        // GROUP TEXT ITEMS INTO LINES (line-by-line approach)
        // ============================================================
        function groupTextIntoLines(items,viewport,textStyles,underlines){
            const lines=[], thr=3; let si=0;
            for(const item of items){
                si++;
                const tx=item.transform;
                const fs=Math.sqrt(tx[0]*tx[0]+tx[1]*tx[1]);
                const x=tx[4], y=viewport.height-tx[5];
                const style=textStyles.get(si)||{};
                let line=lines.find(l=>Math.abs(l.y-y)<thr);
                if(!line){line={y,items:[],fontSize:fs,fontName:item.fontName}; lines.push(line);}
                line.items.push({
                    str:item.str, x, fontSize:fs, width:item.width||0,
                    fontName:style.fontName||item.fontName,
                    color:style.color||{r:0,g:0,b:0}
                });
            }
            for(const l of lines) l.items.sort((a,b)=>a.x-b.x);
            lines.sort((a,b)=>a.y-b.y);
            for(const l of lines) l.hasUnderline=underlines.some(u=>Math.abs(u.y-l.y)<5);
            // Phase 4: compute per-line leading from PDF inter-line gaps
            for(let i=0;i<lines.length;i++){
                if(i+1<lines.length){
                    const gap=lines[i+1].y-lines[i].y;
                    // Only use gap if it's >= fontSize (not same line split)
                    lines[i].leading=(gap>=lines[i].fontSize)?gap:(lines[i].fontSize*1.2);
                } else {
                    lines[i].leading=lines[i].fontSize*1.2; // last line: default
                }
            }
            return lines;
        }

        // ============================================================
        // BUILD HTML PAGE (no PDF canvas, pure HTML only)
        // ============================================================
        function buildHTMLPage(pageNum,viewport,lines){
            const pageDiv=document.createElement('div');
            pageDiv.className='pdf-page';
            pageDiv.id='pdf-page-'+pageNum;
            pageDiv.style.width=(viewport.width*zoom)+'px';
            pageDiv.style.height=(viewport.height*zoom)+'px';
            for(const line of lines){
                const span=createEditableSpan(line,pageNum);
                pageDiv.appendChild(span);
            }
            setupDoubleClickOnPage(pageDiv);
            viewer.appendChild(pageDiv);
        }

        // ============================================================
        // CREATE EDITABLE SPAN FOR ONE LINE (with full styling)
        // ============================================================
        function createEditableSpan(line,pageNum){
            const span=document.createElement('span');
            span.className='text-span';
            span.contentEditable='true';
            span.spellcheck=false;

            // Text: join ALL items including spaces
            const text=line.items.map(i=>i.str).join('');
            span.textContent=text;
            span.dataset.page=pageNum;
            span.dataset.originalText=text;

            // Position
            const minX=Math.min(...line.items.map(i=>i.x));
            const maxX=Math.max(...line.items.map(i=>i.x+i.width));
            const tw=maxX-minX;
            span.style.position='absolute';
            span.style.fontSize=(line.fontSize*zoom)+'px';

            // Font family
            span.style.fontFamily=mapFontToWeb(line.fontName);

            // Bold / Italic detection (must be before _meta assignment)
            const fl=(line.fontName||'').toLowerCase();
            const isBold=fl.includes('bold')||fl.includes('black')||fl.includes('medium')||fl.includes('demi')||fl.includes('semibold');
            span.style.fontWeight=isBold?'bold':'normal';
            const isItalic=fl.includes('italic')||fl.includes('oblique');
            span.style.fontStyle=isItalic?'italic':'normal';

            // Phase 2: detect direction
            const dir = detectDirection(text);
            span.setAttribute('dir', dir);

            // Metadata for export (with direction)
            const parsedFontType = line.fontName ? detectFontTypeFromName(line.fontName) : 'helvetica';
            span._meta={pageNum,x:minX,y:line.y,fontSize:line.fontSize,fontName:line.fontName,width:tw,height:line.fontSize,leading:line.leading||line.fontSize*1.2,isBold,isItalic,hasUnderline:line.hasUnderline,dir:dir,fontType:parsedFontType};

            // Position with direction awareness
            positionSpan(span, span._meta);

            // Underline
            span.style.textDecoration=line.hasUnderline?'underline':'none';
            if(line.hasUnderline){
                const c=line.items[0].color;
                span.style.textDecorationColor='rgb('+Math.round(c.r*255)+','+Math.round(c.g*255)+','+Math.round(c.b*255)+')';
            }

            // Color
            const col=line.items[0].color;
            span.style.color='rgb('+Math.round(col.r*255)+','+Math.round(col.g*255)+','+Math.round(col.b*255)+')';

            // Other styles (Phase 4: derive lineHeight from PDF leading)
            const leadingRatio = (line.leading || line.fontSize * 1.2) / line.fontSize;
            span.style.lineHeight = leadingRatio.toFixed(2);
            span.style.whiteSpace='pre';
            span.style.minWidth=Math.max(tw*zoom,10)+'px';
            span.style.padding='0'; span.style.margin='0';
            span.style.border='1px solid transparent';
            span.style.outline='none';
            span.style.cursor='text';
            span.style.pointerEvents='auto';
            span.style.userSelect='text';



            // Focus: update toolbar
            span.addEventListener('focus',()=>{
                currentEditingEl=span; lastEditingEl=span;
                fontSizeInput.value=Math.round(parseInt(span.style.fontSize)/zoom);
                const c=span.style.color;
                if(c.startsWith('rgb')){
                    const m=c.match(/(\d+)/g);
                    if(m) fontColorInput.value='#'+m.slice(0,3).map(v=>{const h=parseInt(v).toString(16);return h.length===1?'0'+h:h;}).join('');
                } else if(c) fontColorInput.value=c;
                const fam=span.style.fontFamily.toLowerCase();
                if(fam.includes('serif')||fam.includes('times')) fontFamilySelect.value='serif';
                else if(fam.includes('monospace')||fam.includes('courier')) fontFamilySelect.value='monospace';
                else fontFamilySelect.value='helvetica';
                boldBtn.style.background=span.style.fontWeight==='bold'?'rgba(0,212,255,0.3)':'';
                italicBtn.style.background=span.style.fontStyle==='italic'?'rgba(0,212,255,0.3)':'';
                underlineBtn.style.background=span.style.textDecoration==='underline'?'rgba(0,212,255,0.3)':'';
                // Phase 2: update direction toggle
                $('dirToggle').value = span._meta.dir || 'ltr';
            });

            // Blur: track changes
            span.addEventListener('blur',()=>{
                currentEditingEl=null;
                boldBtn.style.background=''; italicBtn.style.background=''; underlineBtn.style.background='';
                const nt=span.textContent, orig=span.dataset.originalText;
                if(nt!==orig){span.dataset.originalText=nt; span.classList.add('changed'); changes++; updateChangeCount();}
            });
            span.addEventListener('keydown',e=>{if(e.key==='Enter') splitSpanAtCursor(span,e); if(e.key==='Backspace') handleBackspace(span,e);});
            // Phase 3: directional overflow wrapping
            span.addEventListener('input', function(){
                handleOverflowWrap(span);
                showEdgeGuide(span);
            });
            span.addEventListener('focus', function(){ showEdgeGuide(span); });
            span.addEventListener('blur', function(){ span.classList.remove('edge-guide'); });
            return span;
        }

        // ============================================================
        // FEATURE 2: Double-click on empty area → new text line
        // ============================================================
        function setupDoubleClickOnPage(pageDiv){
            pageDiv.addEventListener('dblclick',function(e){
                const clickedSpan=e.target.classList.contains('text-span') || (e.target.closest && e.target.closest('.text-span'));
                if(clickedSpan) return;
                const rect=pageDiv.getBoundingClientRect();
                const x=(e.clientX-rect.left)/zoom;
                const y=(e.clientY-rect.top)/zoom;
                const pageNum=parseInt(pageDiv.id.split('-').pop());
                const dir = $('dirToggle').value;
                // Phase 2: for RTL, anchorRight = pageWidth - EDGE_PAD (full width)
                // For LTR, x = click position
                const bounds = getPageBounds(pageNum);
                // For RTL: x = pageWidth - EDGE_PAD (anchorRight at right margin, width=0)
                // For LTR: x = click position
                const spanX = (dir === 'rtl') ? (bounds.width - EDGE_PAD) : x;
                const newSpan=createNewSpan(pageNum,spanX,y,12,'',null,dir,12*1.2,null); // null style = defaults for empty-area creation
                // Phase 4: clamp span creation
                clampSpanPosition(newSpan._meta, pageNum);
                positionSpan(newSpan, newSpan._meta);
                pageDiv.appendChild(newSpan);
                newSpan.focus();
            });
        }

        // ============================================================
        // FEATURE 1: Split span at cursor on Enter (go down a row)
        // ============================================================
        function getCursorOffset(span){
            const sel=window.getSelection();
            if(!sel.rangeCount) return -1;
            const range=sel.getRangeAt(0);
            const preRange=document.createRange();
            preRange.selectNodeContents(span);
            preRange.setEnd(range.startContainer,range.startOffset);
            return preRange.toString().length;
        }

        function setCursorOffset(span,pos){
            const range=document.createRange();
            const sel=window.getSelection();
            let charIndex=0;
            let found=false;
            function walkText(node){
                if(found) return;
                if(node.nodeType===3){
                    const nextCharIndex=charIndex+node.length;
                    if(pos<=nextCharIndex){
                        range.setStart(node,pos-charIndex);
                        range.collapse(true);
                        found=true; return;
                    }
                    charIndex=nextCharIndex;
                } else {
                    for(const child of node.childNodes) walkText(child);
                }
            }
            walkText(span);
            if(!found){range.setStart(span,0); range.collapse(true);}
            sel.removeAllRanges(); sel.addRange(range);
        }

        // ============================================================
        // Shift spans down on a page; cascade overflow to new pages
        // ============================================================
        function shiftSpansDown(pageDiv,startY,shiftAmount,pageNum,excludeSpan){
            const pageH=pageDiv.offsetHeight;
            const spans=Array.from(pageDiv.querySelectorAll('.text-span'));
            const toShift=spans.filter(s=>{
                if(s===excludeSpan) return false;
                const top=parseFloat(s.style.top);
                const h=s._meta? s._meta.height*zoom : parseFloat(s.offsetHeight||s.style.fontSize);
                return top+h>startY*zoom;
            });
            toShift.sort((a,b)=>parseFloat(a.style.top)-parseFloat(b.style.top));

            const overflow=[];
            for(const s of toShift){
                const curTop=parseFloat(s.style.top);
                const h=s._meta? s._meta.height*zoom : parseFloat(s.offsetHeight||s.style.fontSize);
                const newTop=curTop+shiftAmount*zoom;
                s.style.top=newTop+'px';
                if(s._meta) s._meta.y+=shiftAmount;
                // Check if pushed past bottom (with margin for readability)
                if(newTop+h>pageH-10){
                    overflow.push(s);
                }
            }
            return overflow;
        }

        function moveSpansToNewPage(overflowSpans,pageDiv,pageNum){
            const newPageNum=pageNum+1;
            let targetPageDiv=pageDiv.nextElementSibling;
            if(!targetPageDiv||!targetPageDiv.classList.contains('pdf-page')){
                // Need to create a new page
                const newPageNum2=allPages.length+1;
                const newPageDiv=createNewPage(newPageNum2,pageDiv.offsetWidth,pageDiv.offsetHeight);
                viewer.appendChild(newPageDiv);
                setupDoubleClickOnPage(newPageDiv);
                allPages.push({pageNum:newPageNum2,width:pageDiv.offsetWidth/zoom,height:pageDiv.offsetHeight/zoom,lines:[]});
                createNewThumbnail(newPageNum2);
                return {pageNum:newPageNum2,div:newPageDiv};
            }
            return {pageNum:parseInt(targetPageDiv.id.split('-')[2]),div:targetPageDiv};
        }

        // ---- Phase 3: Backspace merge (Word-like behavior) ----
        function handleBackspace(span,e){
            if(getCursorOffset(span)===0){
                const pageDiv=span.closest('.pdf-page');
                const spans=Array.from(pageDiv.querySelectorAll('.text-span'));
                // Sort spans by document reading order (y first, then x)
                spans.sort((a,b)=>{
                    const ya=a._meta.y, yb=b._meta.y;
                    const threshold=Math.max(a._meta.height,b._meta.height)*0.5;
                    if(Math.abs(ya-yb)<=threshold){
                        // Same line: LTR sorts by x ascending, RTL by x descending
                        if(a._meta.dir==='rtl'||b._meta.dir==='rtl') return (a._meta.x+a._meta.width)-(b._meta.x+b._meta.width);
                        return a._meta.x-b._meta.x;
                    }
                    return ya-yb;
                });
                const idx=spans.indexOf(span);
                if(idx>0){
                    e.preventDefault();
                    const prev=spans[idx-1];
                    const prevText=prev.textContent||'';
                    const currText=span.textContent||'';
                    // Append current span text to previous span
                    prev.textContent=prevText+currText;
                    prev.dataset.originalText=prev.textContent;
                    prev.classList.add('changed');
                    // Remove current span
                    span.remove();
                    changes++; updateChangeCount();
                    // Place cursor at merge point in previous span
                    prev.focus();
                    setCursorOffset(prev,prevText.length);
                }
            } else if(span.textContent.length===0){
                // Empty span: delete it entirely
                e.preventDefault();
                const pageDiv=span.closest('.pdf-page');
                const spans=Array.from(pageDiv.querySelectorAll('.text-span'));
                spans.sort((a,b)=>a._meta.y-b._meta.y||a._meta.x-b._meta.x);
                const idx=spans.indexOf(span);
                span.remove();
                changes++; updateChangeCount();
                // Focus previous span if exists
                if(idx>0 && spans[idx-1]){
                    spans[idx-1].focus();
                    setCursorOffset(spans[idx-1],(spans[idx-1].textContent||'').length);
                } else if(idx>0){
                    spans[0] && spans[0].focus();
                }
            }
        }

        function splitSpanAtCursor(span,e){
            e.preventDefault();
            const offset=getCursorOffset(span);
            const fullText=span.textContent;
            const before=fullText.substring(0,offset);
            const after=fullText.substring(offset);
            const meta=span._meta;
            const pageDiv=span.parentElement;
            const pageH=pageDiv.offsetHeight;
            const lineHeight=meta.leading||meta.height;  // Phase 4: use PDF-derived leading
            const newY=meta.y+lineHeight;

            // Update current span with text before cursor
            span.textContent=before;
            span.dataset.originalText=before;
            span.classList.add('changed');
            changes++; updateChangeCount();

            // Shift ALL spans below this line down by one line height (exclude current span)
            const overflow=shiftSpansDown(pageDiv,meta.y,lineHeight,meta.pageNum,span);

            // Create new span at the split position (inherit direction from parent)
            // For RTL, continuation uses same anchorRight; for LTR, same left origin
            const newSpanX = (meta.dir === 'rtl')
                ? (meta.x + meta.width)  // for RTL: x = anchorRight (width will be set below)
                : meta.x;
            const newSpan=createNewSpan(meta.pageNum,newSpanX,newY,lineHeight,after,meta.fontName,meta.dir,lineHeight,{isBold:meta.isBold,isItalic:meta.isItalic,hasUnderline:meta.hasUnderline,color:span.style.color,fontType:meta.fontType||null});
            // For RTL: adjust x so anchorRight matches parent's
            if(meta.dir === 'rtl'){
                const estimatedWidth = (after||'').length * lineHeight * 0.6;
                newSpan._meta.x = (meta.x + meta.width) - estimatedWidth;
                newSpan._meta.width = estimatedWidth;
            }
            // Phase 4: clamp
            clampSpanPosition(newSpan._meta, meta.pageNum);
            positionSpan(newSpan, newSpan._meta);
            newSpan.classList.add('changed');
            changes++; updateChangeCount();
            pageDiv.appendChild(newSpan);

            // Handle overflow - cascade to new pages using shared function
            const allOverflow=Array.from(pageDiv.querySelectorAll('.text-span')).filter(s=>{
                const top=parseFloat(s.style.top);
                const h=s._meta? s._meta.height*zoom : parseFloat(s.offsetHeight||s.style.fontSize);
                return top+h>pageH-BOTTOM_PAD*zoom;
            });
            if(allOverflow.length>0){
                cascadeSpansToNewPages(allOverflow,pageDiv,meta.pageNum);
            }

            newSpan.focus();
            setCursorOffset(newSpan,0);
        }

        function createNewSpan(pageNum,x,y,fontSize,text,fontName,dir,leading,style){
            const span=document.createElement('span');
            span.className='text-span';
            span.contentEditable='true';
            span.spellcheck=false;
            span.textContent=text||'';
            span.dataset.page=pageNum;
            span.dataset.originalText=text||'';
            span.dataset.newText='true';

            span.style.position='absolute';
            span.style.fontSize=(fontSize*zoom)+'px';
            span.style.fontFamily=fontName?mapFontToWeb(fontName):mapFontToWeb(null);
            // Phase 5: inherit full styling from parent (or defaults)
            span.style.fontWeight=style&&style.isBold?'bold':'normal';
            span.style.fontStyle=style&&style.isItalic?'italic':'normal';
            span.style.textDecoration=style&&style.hasUnderline?'underline':'none';
            span.style.color=style?style.color:'rgb(0,0,0)';
            const effectiveLeading = leading || fontSize * 1.2;
            span.style.lineHeight = (effectiveLeading / fontSize).toFixed(2);
            span.style.whiteSpace='pre';
            span.style.minWidth=Math.max((text||'').length*fontSize*0.6*zoom,10)+'px';
            span.style.padding='0'; span.style.margin='0';
            span.style.border='1px solid transparent';
            span.style.outline='none';
            span.style.cursor='text';
            span.style.pointerEvents='auto';
            span.style.userSelect='text';

            // Phase 2: direction
            const resolvedDir = dir || documentDir;
            span.setAttribute('dir', resolvedDir);

            const effLeading = leading || fontSize * 1.2;
            const fontType = style && style.fontType ? style.fontType : (fontName ? detectFontTypeFromName(fontName) : 'helvetica');
            span._meta={pageNum,x,y,fontSize,fontName:fontName||null,width:(text||'').length*fontSize*0.6,height:fontSize,leading:effLeading,isBold:!!(style&&style.isBold),isItalic:!!(style&&style.isItalic),hasUnderline:!!(style&&style.hasUnderline),dir:resolvedDir,fontType:fontType};

            // Position with direction awareness
            positionSpan(span, span._meta);

            span.addEventListener('focus',()=>{
                currentEditingEl=span; lastEditingEl=span;
                fontSizeInput.value=Math.round(parseInt(span.style.fontSize)/zoom);
                const c=span.style.color;
                if(c.startsWith('rgb')){
                    const m=c.match(/(\d+)/g);
                    if(m) fontColorInput.value='#'+m.slice(0,3).map(v=>{const h=parseInt(v).toString(16);return h.length===1?'0'+h:h;}).join('');
                } else if(c) fontColorInput.value=c;
                const fam=span.style.fontFamily.toLowerCase();
                if(fam.includes('serif')||fam.includes('times')) fontFamilySelect.value='serif';
                else if(fam.includes('monospace')||fam.includes('courier')) fontFamilySelect.value='monospace';
                else fontFamilySelect.value='helvetica';
                boldBtn.style.background=span.style.fontWeight==='bold'?'rgba(0,212,255,0.3)':'';
                italicBtn.style.background=span.style.fontStyle==='italic'?'rgba(0,212,255,0.3)':'';
                underlineBtn.style.background=span.style.textDecoration==='underline'?'none':'';
                // Phase 2: update direction toggle
                $('dirToggle').value = span._meta.dir || 'ltr';
            });

            // Phase 2: re-detect direction on first keystroke into empty span
            span.addEventListener('input', function phase2Redetect(e){
                if(span._meta._redetected) return;
                const t = span.textContent;
                const d = detectDirection(t);
                if(d !== span._meta.dir){
                    span._meta.dir = d;
                    span.setAttribute('dir', d);
                    // Re-position span if direction changed
                    positionSpan(span, span._meta);
                }
                // After first real text input, mark as redetected
                if(t.trim().length > 0) span._meta._redetected = true;
            });

            // Phase 3: directional overflow wrapping + Phase 5: edge guide
            span.addEventListener('input', function(){
                handleOverflowWrap(span);
                showEdgeGuide(span);
            });
            span.addEventListener('focus', function(){ showEdgeGuide(span); });
            span.addEventListener('blur', function(){ span.classList.remove('edge-guide'); });

            span.addEventListener('blur',()=>{
                currentEditingEl=null;
                boldBtn.style.background=''; italicBtn.style.background=''; underlineBtn.style.background='';
                const nt=span.textContent, orig=span.dataset.originalText;
                if(nt!==orig){span.dataset.originalText=nt; span.classList.add('changed'); changes++; updateChangeCount();}
            });

            span.addEventListener('keydown',e=>{if(e.key==='Enter') splitSpanAtCursor(span,e); if(e.key==='Backspace') handleBackspace(span,e);});

            return span;
        }

        function mapFontToWeb(name){
            if(!name) return "'Helvetica', Arial, sans-serif";
            const n=name.toLowerCase();
            if(n.includes('times')||n.includes('roman')) return "'Times New Roman', Times, serif";
            if(n.includes('courier')||n.includes('mono')) return "'Courier New', Courier, monospace";
            return "'Helvetica', Arial, sans-serif";
        }
        function mapFontType(type){
            const fonts = {
                'helvetica': "'Helvetica', Arial, sans-serif",
                'serif': "'Times New Roman', Times, serif",
                'monospace': "'Courier New', Courier, monospace",
                'roboto': "'Roboto', 'Helvetica Neue', Arial, sans-serif",
                'open-sans': "'Open Sans', 'Helvetica Neue', Arial, sans-serif",
                'lato': "'Lato', 'Helvetica Neue', Arial, sans-serif",
                'montserrat': "'Montserrat', 'Helvetica Neue', Arial, sans-serif",
                'raleway': "'Raleway', 'Helvetica Neue', Arial, sans-serif",
                'pt-sans': "'PT Sans', 'Helvetica Neue', Arial, sans-serif",
                'nunito': "'Nunito', 'Helvetica Neue', Arial, sans-serif",
                'poppins': "'Poppins', 'Helvetica Neue', Arial, sans-serif",
                'playfair-display': "'Playfair Display', 'Times New Roman', serif",
                'merriweather': "'Merriweather', 'Times New Roman', serif",
                'lora': "'Lora', 'Times New Roman', serif",
                'fira-code': "'Fira Code', 'Courier New', monospace",
                'ibm-plex-mono': "'IBM Plex Mono', 'Courier New', monospace",
                'dancing-script': "'Dancing Script', cursive"
            };
            return fonts[type] || fonts['helvetica'];
        }

        // ============================================================
        // FEATURE 3: Create new blank page and thumbnail
        // ============================================================
        function createNewPage(pageNum,width,height){
            const pageDiv=document.createElement('div');
            pageDiv.className='pdf-page';
            pageDiv.id='pdf-page-'+pageNum;
            pageDiv.style.width=width+'px';
            pageDiv.style.height=height+'px';
            return pageDiv;
        }

        function createNewThumbnail(pageNum){
            const thumb=document.createElement('div');
            thumb.className='page-thumb';
            const img=document.createElement('img');
            // Blank page thumbnail (SVG)
            img.src='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="80" height="100"><rect fill="white" width="80" height="100" rx="2"/><text x="40" y="55" text-anchor="middle" fill="#ccc" font-size="10">Page '+pageNum+'</text></svg>';
            thumb.appendChild(img);
            thumb.title='Page '+pageNum;
            thumb.addEventListener('click',()=>{
                document.querySelectorAll('.page-thumb').forEach(t=>t.classList.remove('active'));
                thumb.classList.add('active');
                document.getElementById('pdf-page-'+pageNum).scrollIntoView({behavior:'smooth'});
            });
            pagesPanel.appendChild(thumb);
        }

        async function createThumbnail(pageNum){
            const thumb=document.createElement('div');
            thumb.className='page-thumb'+(pageNum===1?' active':'');
            const img=document.createElement('img');
            const page=await pdfDoc.getPage(pageNum), vp=page.getViewport({scale:0.2});
            const c=document.createElement('canvas'); c.width=vp.width; c.height=vp.height;
            await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
            img.src=c.toDataURL(); thumb.appendChild(img); thumb.title='Page '+pageNum;
            thumb.addEventListener('click',()=>{
                document.querySelectorAll('.page-thumb').forEach(t=>t.classList.remove('active'));
                thumb.classList.add('active');
                document.getElementById('pdf-page-'+pageNum).scrollIntoView({behavior:'smooth'});
            });
            pagesPanel.appendChild(thumb);
        }

        // ---- Phase 6: Detect font type from PDF font name ----
        function detectFontTypeFromName(name){
            if(!name) return 'helvetica';
            const n = name.toLowerCase();
            if(n.includes('times') || n.includes('roman')) return 'serif';
            if(n.includes('courier') || n.includes('mono')) return 'monospace';
            return 'helvetica';
        }

        function changeZoom(d){zoom=Math.max(0.5,Math.min(3,zoom+d)); zoomLevelEl.textContent=Math.round(zoom*100)+'%'; rebuildAll();}
        async function rebuildAll(){
            viewer.innerHTML=''; pagesPanel.innerHTML='';
            for(const p of allPages){
                const page=await pdfDoc.getPage(p.pageNum), vp=page.getViewport({scale:1}),
                      ops=await page.getOperatorList(), tc=await page.getTextContent();
                const ts=extractTextStyles(ops), ul=extractUnderlines(ops,vp);
                const lines=groupTextIntoLines(tc.items,vp,ts,ul);
                buildHTMLPage(p.pageNum,vp,lines); await createThumbnail(p.pageNum);
            }
        }

        // ---- Phase 6: Arabic detection helper ----
        function containsArabic(str) {
            // Arabic Unicode range: U+0600–U+06FF, U+0750–U+077F, U+08A0–U+08FF, U+FB50–U+FDFF, U+FE70–U+FEFF
            return /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/.test(str);
        }

        // ---- Phase 6: Hard boundary clamp for draw position ----
        function clampDrawPosition(x, drawWidth, pageWidth) {
            if (x < 4) x = 4;
            if (x + drawWidth > pageWidth - 4) x = pageWidth - 4 - drawWidth;
            return x;
        }

        // ---- Phase 6: Load font helper ----
        async function loadHebrewFont(doc, isBold) {
            const url = isBold ? '../fonts/NotoSansHebrew-Bold.ttf' : '../fonts/NotoSansHebrew-Regular.ttf';
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('Failed to load ' + url + ': ' + resp.status);
            const fontBytes = await resp.arrayBuffer();
            return await doc.embedFont(fontBytes);
        }

        async function exportPDF(){
            progressBar.style.display='block'; progressFill.style.width='30%'; resultArea.style.display='none';
            try{
                const ab=await currentFile.arrayBuffer(), bytes=new Uint8Array(ab);
                const doc=await PDFLib.PDFDocument.load(bytes.slice());

                // Phase 6: Register fontkit for custom fonts
                const fk = typeof window.fontkit !== 'undefined' ? window.fontkit : fontkit;
                if (!fk) throw new Error('fontkit not loaded');
                doc.registerFontkit(fk);

                progressFill.style.width='40%';
                const helvetica=await doc.embedFont(PDFLib.StandardFonts.Helvetica);
                const times=await doc.embedFont(PDFLib.StandardFonts.TimesRoman);
                const courier=await doc.embedFont(PDFLib.StandardFonts.Courier);

                // Phase 6: Pre-check for Arabic text
                const allSpans=document.querySelectorAll('.text-span');
                let arabicFound=false;
                for(const span of allSpans){
                    const nt=span.textContent;
                    if(containsArabic(nt)){ arabicFound=true; break; }
                }
                if(arabicFound){
                    alert('Arabic text detected. Arabic shaping is not supported. Please remove Arabic text and try again.');
                    progressBar.style.display='none';
                    return;
                }

                // Phase 6: Try to load Hebrew font (fail fast with clear error)
                let hebrewFont, hebrewBold;
                try {
                    hebrewFont = await loadHebrewFont(doc, false);
                    hebrewBold = await loadHebrewFont(doc, true);
                } catch(err) {
                    throw new Error('Cannot load Hebrew font: ' + err.message + '. Ensure fonts/NotoSansHebrew-*.ttf exist.');
                }

                // ---- Phase 6: Load custom fonts (lazy cache) ----
                const customFontCache = {};
                async function loadCustomFont(type, isBold) {
                    const key = type + (isBold ? '-bold' : '-regular');
                    if (!customFontCache[key]) {
                        const folderName = type.toLowerCase().replace(/\s+/g, '-');
                        const url = `fonts/${folderName}/${isBold ? 'bold' : 'regular'}.ttf`;
                        try {
                            const resp = await fetch(url);
                            if (!resp.ok) throw new Error(`Font ${url}: ${resp.status}`);
                            const fontBytes = await resp.arrayBuffer();
                            customFontCache[key] = await doc.embedFont(fontBytes);
                        } catch(e) {
                            console.warn(`Failed to load custom font ${type} (${isBold?'bold':'regular'}): ${e.message}`);
                            customFontCache[key] = null; // fallback to standard
                        }
                    }
                    return customFontCache[key];
                }

                // Add new pages if any were created
                const originalPages=doc.getPageCount();
                for(let i=originalPages+1;i<=allPages.length;i++){
                    const pg=allPages[i-1];
                    const pe=document.getElementById('pdf-page-'+i);
                    if(pe) doc.addPage([pe.offsetWidth,pe.offsetHeight]);
                    else doc.addPage([612,792]);
                }

                for(const span of allSpans){
                    const nt=span.textContent, orig=span.dataset.originalText;
                    if(nt===orig && !span.dataset.newText) continue;
                    const m=span._meta, pg=doc.getPage(m.pageNum-1);
                    const {width:pw,height:ph}=pg.getSize();
                    const pe=document.getElementById('pdf-page-'+m.pageNum);
                    const sx=pw/pe.offsetWidth, sy=ph/pe.offsetHeight;
                    const fs=m.fontSize*Math.min(sx,sy);

                    // Phase 6: Choose font based on direction and fontType
                    let font;
                    if(m.dir === 'rtl') {
                        // Hebrew: use Noto Sans Hebrew
                        font = m.isBold ? hebrewBold : hebrewFont;
                    } else {
                        // Check for custom font first (from toolbar selection)
                        const fontType = m.fontType || (m.fontName ? detectFontTypeFromName(m.fontName) : 'helvetica');
                        const customFont = await loadCustomFont(fontType, m.isBold);
                        if (customFont) {
                            font = customFont;
                        } else {
                            // Fallback to standard fonts
                            font = helvetica;
                            if(/times|roman/i.test(m.fontName||'')) font=times;
                            else if(/courier|mono/i.test(m.fontName||'')) font=courier;
                        }
                    }

                    // Phase 6: bidi-js for RTL text
                    const bidiLib = typeof window.bidi_js !== 'undefined' ? window.bidi_js() : null;
                    let displayText = nt;
                    if(m.dir === 'rtl' && bidiLib) {
                        const embedLevels = bidiLib.getEmbeddingLevels(nt, 'rtl');
                        const indices = bidiLib.getReorderedIndices(nt, embedLevels);
                        // Rebuild string using reordered indices
                        const chars = nt.split('');
                        displayText = indices.map(i => chars[i]).join('');
                    }

                    // Phase 6: Measure text width
                    const textWidth = font.widthOfTextAtSize(displayText, fs);
                    let drawX;

                    if(m.dir === 'rtl') {
                        // Phase 6: RTL draw position = anchorRight - textWidth
                        // For RTL spans: m.x is stored as anchorRight for RTL (x + width from _meta)
                        const anchorRight = (m.x + m.width) * sx;
                        drawX = anchorRight - textWidth;
                    } else {
                        // LTR: standard positioning
                        drawX = m.x * sx;
                    }

                    // Phase 6: Hard boundary clamp
                    drawX = clampDrawPosition(drawX, textWidth, pw);
                    const drawY = ph - (m.y * sy);

                    // If editing existing text, white out first
                    if(!span.dataset.newText){
                        const tw = m.width * sx;
                        pg.drawLine({
                            start:{x: drawX - 2, y: drawY + fs*0.8},
                            end:{x: drawX + tw + 2, y: drawY + fs*0.8},
                            thickness: fs*1.3,
                            color: PDFLib.rgb(1,1,1)
                        });
                    }

                    pg.drawText(displayText, {
                        x: drawX,
                        y: drawY + fs*0.15,
                        size: fs,
                        font: font,
                        color: PDFLib.rgb(0,0,0)
                    });
                }

                progressFill.style.width='90%';
                const pb=await doc.save(), blob=new Blob([pb],{type:'application/pdf'});
                downloadLink.href=URL.createObjectURL(blob); downloadLink.download='edited.pdf';
                progressFill.style.width='100%';
                setTimeout(()=>{progressBar.style.display='none';resultArea.style.display='block';},300);
            }catch(err){
                console.error('Export failed:',err);
                alert('Export failed: '+err.message);
                progressBar.style.display='none';
            }
        }

        function resetEditor(){
            pdfDoc=null; currentFile=null; allPages=[]; changes=0; zoom=1; currentEditingEl=null; lastEditingEl=null;
            zoomLevelEl.textContent='100%'; viewer.innerHTML=''; pagesPanel.innerHTML='';
            resultArea.style.display='none'; uploadZone.style.display='block';
            editorArea.style.display='none'; fileInput.value=''; updateChangeCount();
        }
        function updateChangeCount(){changeCountEl.textContent=changes+(changes===1?' change':' changes');}

        // ---- Phase 1 verification ----
        (function(){
            console.log('[Phase 1] getPageBounds verified for each page:');
            // Will be called after load to log bounds
        })();


    </script>
